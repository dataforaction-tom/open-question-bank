services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: qb
      POSTGRES_PASSWORD: qb
      POSTGRES_DB: qb
    ports:
      - "5432:5432"
    volumes:
      - qb_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qb -d qb"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - qb_ollama:/root/.ollama
    healthcheck:
      # `ollama` CLI ships in the image (curl does not); `ollama list` succeeds once the API is up.
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgres://qb:qb@db:5432/qb
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: nomic-embed-text
      EMBEDDING_DIM: "768"
      DEDUP_THRESHOLD: "0.15"
      CLUSTER_THRESHOLD: "0.2"
      ADMIN_PASSWORD: admin
      ADMIN_SESSION_SECRET: dev-only-secret-do-not-use-in-prod-0123456789
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  qb_pgdata:
  qb_ollama:
